<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASPLAN | Project Name</title> <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* --- CORE STYLES (Matches your site) --- */
        :root { --color-bg: #0b0b0b; --color-text: #f5f5f5; --color-accent: #C5A059; --color-red: #E60000; --font-head: 'Montserrat', sans-serif; --font-body: 'Cormorant Garamond', serif; }
        body { background-color: var(--color-bg); color: var(--color-text); font-family: var(--font-body); margin: 0; padding: 0; box-sizing: border-box; }
        a { text-decoration: none; color: inherit; }

        /* --- NAV (Simplified) --- */
        nav { padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: var(--font-head); font-weight: 700; font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; }
        .logo-as { color: var(--color-red); } .logo-plan { color: #fff; }
        .back-link { font-family: var(--font-head); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #888; transition: 0.3s; }
        .back-link:hover { color: var(--color-accent); }

        /* --- PROJECT HERO --- */
        .project-hero {
            height: 60vh;
            width: 100%;
            /* UPDATE BACKGROUND IMAGE HERE */
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.6)), url('branksea-new-1.webp');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            padding: 50px;
        }
        
        .hero-content h1 { font-family: var(--font-head); font-size: 3rem; text-transform: uppercase; margin: 0; color: #fff; }
        .hero-content p { font-family: var(--font-head); font-size: 1rem; color: var(--color-accent); margin-top: 10px; letter-spacing: 2px; }

        /* --- DESCRIPTION SECTION --- */
        .project-desc { max-width: 900px; margin: 60px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 2fr; gap: 50px; }
        .desc-meta h4 { font-family: var(--font-head); color: #666; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px; }
        .desc-meta p { font-size: 1.1rem; margin-bottom: 20px; color: #fff; }
        .desc-text p { font-size: 1.2rem; line-height: 1.8; color: #ccc; margin-bottom: 20px; }
        
        /* --- GALLERY GRID --- */
        .gallery-section { padding: 20px 20px 80px 20px; max-width: 1400px; margin: 0 auto; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .gallery-item img { width: 100%; height: 350px; object-fit: cover; filter: grayscale(30%); transition: 0.4s; }
        .gallery-item img:hover { filter: grayscale(0%); transform: scale(1.02); }

        /* MOBILE */
        @media(max-width: 768px) { .project-desc { grid-template-columns: 1fr; } .project-hero h1 { font-size: 2rem; } }
    </style>
</head>
<body>

    <nav>
        <a href="residential.html" class="back-link">← Back to Residential</a>
        <a href="index.html" class="logo"><span class="logo-as">As</span><span class="logo-plan">plan</span></a>
    </nav>

    <header class="project-hero">
        <div class="hero-content">
            <h1>Give Us A Sign</h1> <p></p>    </div>
    </header>

    <section class="project-desc">
        <div class="desc-meta">
            <h4>Year</h4> <p>2021</p>
            <h4>Service</h4> <p>Full Planning & Design</p>
            <h4>Status</h4> <p>Planning permission granted</p>
        </div>
        <div class="desc-text">
            <p>Blurb</p>
            <p>Blurb</p>
        </div>
    </section>

    <section class="gallery-section">
        <div class="gallery-grid">
            <div class="gallery-item"><img src="branksea-new-1.webp" alt="outside"></div>
            <div class="gallery-item"><img src="branksea-2.webp" alt="outside"></div>
            <div class="gallery-item"><img src="Branks sea3.webp" alt="outside"></div>
            <div class="gallery-item"><img src="branksea-8.webp" alt="Kitchen Detail"></div>
            <div class="gallery-item"><img src="branksea-6.webp" alt="outside"></div>
            <div class="gallery-item"><img src="branksea-7.webp" alt="outside"></div>
            <div class="gallery-item"><img src="Branksea-5.webp" alt="outside"></div>
        </div>
    </section>

    <footer style="text-align:center; padding: 40px; border-top: 1px solid #222; font-size: 0.7rem; color: #444;">
        &copy; 2024 Asplan Associates.
    </footer>

</body>
</html>
